name: Validate schemas

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate block schemas
        run: python scripts/validate.py nbt_upgrade_schema nbt_upgrade_schema_schema.json

      - name: Validate item schemas
        run: python scripts/validate.py id_meta_upgrade_schema id_meta_upgrade_schema_schema.json
